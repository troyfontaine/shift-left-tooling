name: Build & Publish to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: troyfontaine/shift-left-tooling

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

  test-image:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull pushed image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }} shift-left-tooling:latest

      - name: Run tests in Docker
        run: |
          docker run --rm \
            --user root \
            --entrypoint pytest \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            shift-left-tooling:latest \
            tests/ \
            --cov=lib \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Test script execution
        run: |
          docker run --rm \
            -e GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
            shift-left-tooling:latest \
            get-protected-branches --help

  notify:
    name: Notify on Publish
    runs-on: ubuntu-latest
    needs: [build-and-push, test-image]
    if: success()

    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish notification
        run: |
          echo "✅ Successfully published troyfontaine/shift-left-tooling:${{ steps.version.outputs.TAG }}"
