build-container:
  commands:
    "build-docker-image":
      run: |
        docker build -t shift-left-tooling:latest .
    "test-docker-image":
      run: |
        repo_path=$(git rev-parse --show-toplevel)
        docker run --rm \
          --entrypoint pytest \
          -v "$repo_path:/workspace" \
          -w /workspace \
          shift-left-tooling:latest \
          tests/ \
          --cov=lib \
          --cov=scripts \
          --cov-fail-under=80

repo-wide:
  commands:
    # Python code quality checks
    "pylint":
      glob: "*.py"
      run: |
        repo_path=$(git rev-parse --show-toplevel)
        pushd "$repo_path" > /dev/null || exit 1
        pylint lib/ scripts/ tests/ --fail-under=8.0
        popd > /dev/null || exit 1
    "black-fix-formatting":
      glob: "*.py"
      run: black lib/ scripts/ tests/
    "mypy":
      glob: "*.py"
      run: mypy lib/ scripts/ tests/
    "pytest":
      glob: "*.py"
      run: |
        repo_path=$(git rev-parse --show-toplevel)
        pushd "$repo_path" > /dev/null || exit 1
        pytest tests/ \
        --cov=lib \
        --cov=scripts \
        --cov-fail-under=80
        popd > /dev/null || exit 1
