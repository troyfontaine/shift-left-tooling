---
pre-commit:
  parallel: true
  jobs:
    - name: pylint
      glob: "*.py"
      run: pylint {staged_files} --fail-under=8.0
    - name: black-check
      glob: "*.py"
      run: black --check {staged_files}
    - name: mypy
      glob: "*.py"
      run: mypy {staged_files}
    - name: enforce-naming
      runner: bash
      run: ./.lefthook/pre-commit/enforce-naming

pre-push:
  jobs:
    - name: enforce-protected-branches
      runner: bash
      run: ./.lefthook/pre-push/enforce-protected-branches

